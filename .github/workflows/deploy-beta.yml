name: Deploy Beta

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal | alpha | beta)'
        required: false
        default: 'internal'

concurrency:
  group: deploy-beta-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Beta
    runs-on: ubuntu-latest
    environment: beta

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode the release keystore from a base64 GitHub secret.
      # To generate: base64 -i release.keystore | pbcopy  (macOS)
      # Store the result in the KEYSTORE_BASE64 repository secret.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release AAB and APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      # ── Google Play deployment ──────────────────────────────────────────
      # Requires the following GitHub secrets:
      #   SERVICE_ACCOUNT_JSON   – Google Play service-account JSON key (base64-encoded)
      #
      # Track is "internal" by default; pass a different value via workflow_dispatch.
      - name: Decode Play Store service account
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_JSON }}" | base64 --decode > "$RUNNER_TEMP/service-account.json"

      - name: Upload to Google Play (${{ github.event.inputs.track || 'internal' }} track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ runner.temp }}/service-account.json
          packageName: com.chrona.app
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

      # ── Firebase App Distribution (beta testers) ───────────────────────
      # Distributes the release APK to adrianpothuaud@gmail.com (and any
      # other testers in the "beta-testers" group) via Firebase App
      # Distribution. Note: Firebase App Distribution requires an APK, not
      # an AAB. The AAB above is used exclusively for Play Store uploads.
      #
      # Requires the following GitHub secrets:
      #   FIREBASE_APP_ID   – Firebase Android App ID (e.g. 1:123456:android:abcdef)
      #   FIREBASE_TOKEN    – Firebase CI token generated by `firebase login:ci`
      - name: Distribute via Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: beta-testers
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            Beta build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
